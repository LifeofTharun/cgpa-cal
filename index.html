<!DOCTYPE html>
<html>

<head>
    <title>GPA & CGPA Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/webp" href="kmg.webp">
</head>

<body>

    <div class="container">
        <h1>GPA & CGPA Calculator</h1>
        <p class="subtitle">B.Sc AI Department (2023 - 2026)</p>
        <p class="foo">Crafted by Tharun</p>

        <div class="student-info">
            <input type="text" id="name" placeholder="Student Name" required>
            <input type="text" id="regNo" placeholder="Register Number" required>
        </div>

        <div id="semesters"></div>

        <div class="cgpa-box">
            <h2>Overall CGPA: <span id="cgpa">0.00</span></h2>
            <div class="percentage-box">
                Overall Percentage: <span id="percentage">0.00%</span>
            </div>
        </div>

        <div class="button-group">
            <button onclick="showSummary()">Submit</button>
            <button onclick="resetForm()">Reset</button>
        </div>

        <div id="summaryModal" class="modal"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
